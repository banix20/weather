<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Precipitații Previziune</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Precipitații Previzionate</h1>

    <form id="search-form" class="search-bar" autocomplete="off">
      <div class="search-input-wrap">
        <input
          type="text"
          id="city-input"
          placeholder="Caută un oraș (ex: Cluj-Napoca)"
          aria-label="Caută oraș"
          autocomplete="off"
        />
        <ul id="suggestions-list" class="suggestions-list" role="listbox" hidden></ul>
      </div>
      <button type="submit" id="search-btn" aria-label="Caută">
        🔍
      </button>
      <button type="button" id="gps-btn" aria-label="Folosește locația mea">
        📍
      </button>
    </form>

    <p id="location-name" class="location-name"></p>

    <h2>Total Precipitații 5 zile: <span id="total-precip">Încărcare...</span></h2>

    <div class="chart-container">
      <canvas id="precipChart" aria-label="Grafic precipitații" role="img"></canvas>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
